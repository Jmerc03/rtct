apiVersion: v1
kind: ServiceAccount
metadata:
  name: rtct-api
  namespace: rtct
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rtct-api-pod-reader
  namespace: rtct
rules:
  # Core API resources in the rtct namespace
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      - events
    verbs: ["get", "list", "watch"]
  # Workload resources (apps/v1) in the rtct namespace
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rtct-api-pod-reader-binding
  namespace: rtct
subjects:
  - kind: ServiceAccount
    name: rtct-api
    namespace: rtct
roleRef:
  kind: Role
  name: rtct-api-pod-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rtct-api-read-cluster
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rtct-api-read-cluster-binding
subjects:
  - kind: ServiceAccount
    name: rtct-api
    namespace: rtct
roleRef:
  kind: ClusterRole
  name: rtct-api-read-cluster
  apiGroup: rbac.authorization.k8s.io
