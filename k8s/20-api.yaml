apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtct-api
  namespace: rtct
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rtct-api
  template:
    metadata:
      labels:
        app: rtct-api
    spec:
      serviceAccountName: rtct-api
      nodeSelector:
        kubernetes.io/hostname: attack-pi
      containers:
        - name: rtct-api
          image: jaxmerc536/rtct-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: rtct-config # DATABASE_URL, CORS_ORIGIN
            - secretRef:
                name: rtct-secrets # JWT_SECRET
          env:
            - name: REPO
              value: "sql"
            - name: NODE_ENV
              value: "production"
            - name: K8S_NS
              value: "rtct"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rtct-secrets
                  key: INTERNAL_API_KEY
            - name: INTERNAL_ALERT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rtct-secrets
                  key: INTERNAL_ALERT_TOKEN
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: rtct
spec:
  selector:
    app: rtct-api
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
